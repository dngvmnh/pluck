# Deploy: flyctl launch (first time) or flyctl deploy
# Secrets: flyctl secrets set MYTHOS_API_URL=... MYTHOS_LISTING_ID=... SESSION_SECRET=...
app = "pluck"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  MYTHOS_ENV    = "production"
  PLUCK_DB      = "/data/pluck.db"
  PLUCK_DL_DIR  = "/data/downloads"
  PORT          = "8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 10
    soft_limit = 5

[[mounts]]
  source      = "pluck_data"
  destination = "/data"
  initial_size = "3gb"

[[vm]]
  size = "shared-cpu-1x"
