name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync to HF Spaces via huggingface_hub (handles Xet binary storage)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install "huggingface_hub>=0.24.0"
          python - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          api.upload_folder(
              folder_path=".",
              repo_id="dngvmnh/pluck",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message="Sync from GitHub",
              ignore_patterns=[
                  ".git",
                  "**/__pycache__",
                  "**/.pytest_cache",
                  "**/*.pyc",
                  "*.db",
                  "*.db-wal",
                  "*.db-shm",
                  "downloads/**",
                  ".venv/**",
                  "screenshots/**",
                  "node/.fftools/**",
              ],
          )
          PYEOF
